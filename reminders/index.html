<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tita - Recordatorios compartidos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #FFF8F0;
      color: #5D4E42;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(93,78,66,0.1);
    }
    .icon { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #5D4E42; }
    .subtitle { font-size: 15px; color: #8B7D72; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: #CC6B49;
      color: white;
    }
    .btn-secondary {
      background: transparent;
      color: #CC6B49;
      border: 1.5px solid #CC6B49;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #F5E6D3;
      border-top-color: #CC6B49;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 14px; color: #8B7D72; margin-top: 16px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x1F514;</div>
    <h1 id="title">Recordatorios compartidos</h1>
    <p class="subtitle" id="subtitle">Abriendo en Tita...</p>

    <div id="loading">
      <span class="spinner"></span> Redirigiendo...
    </div>

    <div id="fallback" class="hidden">
      <a id="openBtn" class="btn btn-primary" href="#">Abrir en Tita</a>
      <a class="btn btn-secondary" href="https://play.google.com/store/apps/details?id=com.egeainc.tita">
        Descargar Tita
      </a>
      <p class="status">Si ya tenes Tita instalada, toca "Abrir en Tita".</p>
    </div>
  </div>

  <script>
    (function() {
      var hash = window.location.hash.substring(1);
      if (!hash) {
        document.getElementById('subtitle').textContent = 'Link invalido.';
        document.getElementById('loading').classList.add('hidden');
        return;
      }

      var deepLink = 'tita://reminders/' + hash;

      document.getElementById('openBtn').href = deepLink;

      window.location.href = deepLink;

      setTimeout(function() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('fallback').classList.remove('hidden');
        document.getElementById('subtitle').textContent = 'Toca el boton para importar los recordatorios en Tita.';
      }, 2000);
    })();
  </script>
</body>
</html>
